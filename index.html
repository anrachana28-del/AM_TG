<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Config / Telegram Account</title>
<style>
body { font-family: Arial; padding: 20px; background: #f0f0f0; }
.container { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 10px; }
input, button { width: 100%; padding: 10px; margin: 10px 0; }
</style>
</head>
<body>
<div class="container">
  <h2>Upload Telegram Config</h2>
  <input type="text" id="api_id" placeholder="API_ID">
  <input type="text" id="api_hash" placeholder="API_HASH">
  <input type="text" id="session" placeholder="SESSION">
  <input type="text" id="default_phone" placeholder="Default Phone (+855...)">
  <button id="uploadBtn">Upload to Firebase</button>
  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.3.0/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAuPx4zukNE-TnBClJbTocOwem0twM1KU0",
  authDomain: "tool-add.firebaseapp.com",
  databaseURL: "https://tool-add-default-rtdb.firebaseio.com/",
  projectId: "tool-add"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById("uploadBtn").addEventListener("click", async () => {
  const api_id = document.getElementById("api_id").value.trim();
  const api_hash = document.getElementById("api_hash").value.trim();
  const session = document.getElementById("session").value.trim();
  const default_phone = document.getElementById("default_phone").value.trim();

  if (!api_id || !api_hash || !session) {
    return alert("API_ID, API_HASH, SESSION are required!");
  }

  try {
    // Save Telegram account
    await push(ref(db, "telegram_accounts"), { api_id, api_hash, session });

    // Save default phone in Firebase (for note.js)
    if (default_phone) {
      await set(ref(db, "config/default_phone"), default_phone);
    }

    document.getElementById("status").innerText = "✅ Uploaded successfully!";
  } catch (err) {
    document.getElementById("status").innerText = "❌ Upload failed: " + err.message;
  }
});
</script>
</body>
</html>
