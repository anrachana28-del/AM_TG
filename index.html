<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Add Member Ultimate - Firebase</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
body{font-family:sans-serif;background:#0f172a;color:#fff;padding:20px}
.container{max-width:780px;margin:auto;background:#1e293b;padding:30px;border-radius:18px}
h2,h3{color:#38bdf8}
input,textarea,select,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;background:#020617;color:#fff}
button{cursor:pointer;font-weight:600}
.start{background:#22c55e}
.stop{background:#ef4444}
.restart{background:#f59e0b}
#accountModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999}
#accountModal.show{display:flex;justify-content:center;align-items:flex-start}
#modalContent{background:#1e293b;margin-top:40px;padding:20px;border-radius:14px;width:95%;max-width:760px;position:absolute}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #334155;padding:6px;font-size:14px}
th{background:#020617}
.blocked{opacity:.55}
.reason{font-size:12px;color:#fbbf24}
#memberList{height:200px;overflow:auto;font-family:monospace;background:#020617;padding:10px;border-radius:8px;margin-top:10px;}
.filter-row{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap}
.filter-row div{flex:1;min-width:120px}
</style>
</head>
<body>
<div class="container">
<h2>Telegram Add Member Ultimate</h2>

<button onclick="openModal()">Upload / Select Accounts</button>

<h3>Source Group</h3>
<input id="sourceGroup">

<div class="filter-row">
  <div>
    <label>Members:</label>
    <select id="filterMembers">
      <option value="all" selected>All</option>
      <option value="username">Username Only</option>
    </select>
  </div>
  <div>
    <label>Last Online:</label>
    <select id="filterLastOnline">
      <option value="all" selected>All</option>
      <option value="week">This Week</option>
      <option value="month">This Month</option>
    </select>
  </div>
  <div>
    <label>Profile Photo:</label>
    <select id="filterPhoto">
      <option value="all" selected>All</option>
      <option value="has">Has Photo</option>
    </select>
  </div>
</div>

<h3>Member IDs / Usernames</h3>
<textarea id="users" placeholder="IDs/Usernames"></textarea>
<button onclick="applyFiltersBySource()" style="margin-top:8px;background:#0ea5e9;color:#fff;font-weight:600;">Export Members Here</button>

<div style="display:flex;gap:8px;margin-top:10px">
  <button class="start" onclick="startAddMembersLoop()">Start</button>
  <button class="stop" onclick="stopAddMembersLoop()">Stop</button>
  <button class="restart" onclick="restart()">Restart</button>
  <button onclick="exportMembersCSV()" style="background:#0ea5e9;color:#fff;font-weight:600;">Export Members CSV</button>
</div>

<h3>Members Log</h3>
<div id="memberList"></div>
</div>

<!-- MODAL -->
<div id="accountModal">
  <div id="modalContent">
    <span onclick="closeModal()" style="float:right;cursor:pointer">✖</span>
    <h3>Accounts Manager</h3>
    <input type="file" id="envFile" accept=".env">
    <button onclick="loadEnvFile()">Load .env</button>
    <div style="display:flex;gap:20px;margin:8px 0">
      <div>Total: <b id="totalAcc">0</b></div>
      <div>Blocked: <b id="blockedAcc">0</b></div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Select</th>
          <th>Name</th>
          <th>API ID</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Reason / End</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="modalAccountsList"></tbody>
    </table>
  </div>
</div>

<script src="server.js"></script>
</body>
</html>
