<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Telegram Export Tool</title>
<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px }
input, textarea, button { width:100%; margin:6px 0; padding:8px }
button { background:#22c55e; border:none; cursor:pointer }
pre { background:#020617; padding:10px; height:220px; overflow:auto }
hr { margin:20px 0 }
</style>
</head>
<body>

<h2>Upload Telegram Account (.env / .txt)</h2>
<input type="file" id="file" accept=".env,.txt">
<button onclick="uploadFile()">Upload File</button>

<hr>

<h2>Export Members</h2>
<input id="group" placeholder="https://t.me/groupname">
<button onclick="exportMembers()">Export</button>

<h3>Exported @username</h3>
<pre id="output">No data</pre>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyAuPx4zukNE-TnBClJbTocOwem0twM1KU0",
  authDomain: "tool-add.firebaseapp.com",
  databaseURL: "https://tool-add-default-rtdb.firebaseio.com",
  projectId: "tool-add"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* Upload file and parse accounts */
window.uploadFile = async () => {
  const file = document.getElementById("file").files[0];
  if (!file) {
    alert("Please select a file");
    return;
  }

  const text = await file.text();
  const lines = text.split(/\r?\n/);

  const map = {};
  for (const line of lines) {
    if (!line.includes("=")) continue;
    const [k, v] = line.split("=");
    map[k.trim()] = v?.trim();
  }

  let count = 0;
  for (const key in map) {
    if (key.startsWith("API_ID_")) {
      const idx = key.split("_")[2];
      const api_id = map[`API_ID_${idx}`];
      const api_hash = map[`API_HASH_${idx}`];
      const session = map[`SESSION_${idx}`];

      if (api_id && api_hash && session) {
        await push(ref(db, "telegram_accounts"), {
          api_id,
          api_hash,
          session,
          createdAt: Date.now()
        });
        count++;
      }
    }
  }

  alert(`Uploaded ${count} Telegram account(s) ✅`);
};

/* Send export request */
window.exportMembers = async () => {
  const link = document.getElementById("group").value.trim();
  if (!link) {
    alert("Missing group link");
    return;
  }

  await push(ref(db, "export_requests"), {
    groupLink: link,
    status: "pending",
    createdAt: Date.now()
  });

  alert("Export started 🚀");
};

/* Show exported members */
onValue(ref(db, "exported_members"), snap => {
  const data = snap.val();
  let text = "";
  if (data) {
    Object.values(data).forEach(u => {
      if (u.username) text += "@" + u.username + "\n";
    });
  }
  document.getElementById("output").textContent = text || "No data";
});
</script>

</body>
</html>
